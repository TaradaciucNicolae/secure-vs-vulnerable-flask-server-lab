<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <title>Formular inregistrare</title>
  
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap_sketchy.css') }}">
  
  <script src="{{ url_for('static', filename='validate.js') }}" defer></script>
</head>

<body class="bg-light">

<div class="container mt-5 col-md-6">
  <h1 class="text-center mb-4">Formular de inregistrare</h1>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-info">
        {% for msg in messages %}
          <div>{{ msg | safe }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

<form id="regForm" method="POST" action="/inregistrare" enctype="multipart/form-data" novalidate>
    <div class="mb-3">
      <label class="form-label">Nume utilizator</label>
      <input type="text" name="username" class="form-control" autocomplete="on">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="text" name="email" class="form-control" autocomplete="on">
    </div>

    <div class="mb-3">
      <label>Parola</label>
      <input type="password" name="parola" class="form-control" autocomplete="on">
    </div>

    <div class="mb-3">
      <label>Confirmare parola</label>
      <input type="password" name="confirm_parola" class="form-control" autocomplete="on">
    </div>

    <div class="mb-3">
      <label>Nume</label>
      <input type="text" name="nume" class="form-control">
    </div>

    <div class="mb-3">
      <label>Prenume</label>
      <input type="text" name="prenume" class="form-control">
    </div>

    <div class="mb-3">
      <label>Nume afisat</label>
      <input type="text" name="nume_afisat" class="form-control">
    </div>

    <div class="mb-3">
      <label>URL site propriu</label>
      <input type="text" name="url_site" class="form-control">
    </div>

    <div class="mb-3">
      <label>Imagine profil</label>
      <input type="file" name="imagine_profil" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary w-100">Inregistreaza</button>
</form>

    <p class="mt-3"><a href="{{ url_for('home') }}">Inapoi la home</a></p>
</div>

</body>
</html>
